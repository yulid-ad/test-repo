version: 2

models:
  - name: int_customers
    description: "Intermediate model for customers data"
    columns:
      - name: customer_id
        description: "Unique identifier for each customer. PK"
        tests:
          - unique
          - not_null
      - name: customer_name
        description: "Customer's name"
        tests:
          - not_null
      - name: customer_email
        description: "Customer's email address"
        tests:
          - not_null
      - name: signup_date
        description: "Customer signed up date"
        tests:
          - not_null
      - name: region
        description: "Region data"
      - name: marketing_source
        description: "Marketing source data"
        tests:
          - accepted_values:
              values: ['Organic', 'Paid', 'Google Ads', 'Referral']

  - name: int_subscriptions
    description: "Intermediate model for subscriptions data with plan details"
    columns:
      - name: subscription_id
        description: "Unique identifier for each subscription. PK"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Unique identifier for each customer. FK to int_customers.customer_id"
        tests:
          - not_null
      - name: plan_name
        description: "Name of the subscription plan"
      - name: subscription_status
        description: "Current subscription status"
        tests:
          - accepted_values:
              values: ['Active', 'Pending', 'Cancelled']
      - name: start_date
        description: "Subscription start date"
        tests:
          - not_null
      - name: end_date
        description: "Subscription end date"
      - name: monthly_cost
        description: "Monthly price of the subscription plan"
        tests:
          - not_null
